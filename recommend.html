<!DOCTYPE html>
<html>
<head>
    <style>
       body {
          margin: 0;
          font-family: Arial, sans-serif;
          background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
          color: white;
        }

        .container {
             display: flex;
             flex-direction: column;
             align-items: center;
             justify-content: center;
             margin-top: 100px;
        }

        .search-box {
            margin-top: 20px;
        }

        .search-box input {
            padding: 12px;
            width: 260px;
            border-radius: 8px;
            border: none;
            outline: none;
        }

        .search-box button {
            padding: 12px 20px;
            margin-left: 10px;
            background: #ff4b2b;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .search-box button:hover {
            background: #ff1c00;
        }

        .result-box {
            margin-top: 30px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }

        .movie-card {
            background: #1e2a38;
            padding: 10px;
            border-radius: 10px;
            width: 160px;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .movie-card:hover {
            transform: scale(1.08);
            box-shadow: 0px 0px 15px rgba(255, 75, 43, 0.8);
        }

        .movie-card img {
            width: 100%;
            border-radius: 8px;
            transition: transform 0.3s ease;
        }

        .movie-card p {
            margin-top: 10px;
        }
        
        .movie-card h4 {
            margin: 10px 0 5px;
        }

        .movie-card p {
            font-size: 14px;
            margin: 3px;
        }

        .nav {
            padding: 15px;
            text-align: center;
        }

        .nav a {
            color: white;
            margin: 15px;
            text-decoration: none;
            font-weight: bold;
        }

        .nav a:hover {
            color: #ff4b2b;
        }

    </style>

    <title>Recommendation - CineVerse AI</title>
</head>

<body>

<div class="nav">
    <a href="index.html">Home</a>
    <a href="recommend.html">Recommend</a>
    <a href="sentiment.html">Sentiment</a>
    <a href="eda.html">EDA</a>
</div>

<div class="container">

    <h1>🎬 Movie Recommendation</h1>

    <div class="search-box">
       <input type="text" id="movie" placeholder="Enter movie name">
       <button onclick="recommend()">🎬 Recommend</button>
    </div>

    <div id="result" class="result-box"></div>

</div>

<script>
// login protection
if(localStorage.getItem("loggedIn") !== "true") {
    window.location.href = "login.html";
}

// your existing function
async function recommend() {
    let movie = document.getElementById("movie").value;

    let response = await fetch("http://127.0.0.1:5000/recommend", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({movie: movie})
    });

    let data = await response.json();

    document.getElementById("result").innerHTML = "";

    for (let m of data) {
        let apiKey = "317ac107";  

        for (let m of data) {

            let res = await fetch(`https://www.omdbapi.com/?t=${m}&apikey=${apiKey}`);
            let movieData = await res.json();

            let poster = movieData.Poster !== "N/A" ? movieData.Poster : "https://via.placeholder.com/150";

            let rating = movieData.imdbRating !== "N/A" ? movieData.imdbRating : "No rating";
            let year = movieData.Year !== "N/A" ? movieData.Year : "Unknown";
            let genre = movieData.Genre !== "N/A" ? movieData.Genre : "Not available";

            document.getElementById("result").innerHTML += `
            <div class="movie-card">
               <img src="${poster}" alt="poster">
               <h4>${m}</h4>
               <p>⭐ ${rating}</p>
               <p>📅 ${year}</p>
               <p>🎭 ${genre}</p>
            </div>
            `;
        }
    }
}
</script>

</body>
</html>
